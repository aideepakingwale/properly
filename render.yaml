# render.yaml — Properly AI Phonics Tutor
# Render Infrastructure-as-Code Blueprint
#
# ┌────────────────────────────────────────────────────────────┐
# │  PERSISTENT DATABASE — CHOOSE ONE OPTION                   │
# │                                                            │
# │  OPTION A: Turso  (FREE forever — recommended)             │
# │  1. turso.tech → Sign up free                              │
# │  2. Create a database → copy URL + token                   │
# │  3. Add to Render env vars:                                │
# │       TURSO_DATABASE_URL = libsql://your-db.turso.io      │
# │       TURSO_AUTH_TOKEN   = eyJ...                          │
# │  4. Leave DB_PATH as /tmp (Turso takes over automatically) │
# │  Free limits: 500 MB, 1 billion row-reads/month            │
# │                                                            │
# │  OPTION B: Render Disk  ($7/mo Starter plan)               │
# │  1. Upgrade properly-api service to Starter plan           │
# │  2. Uncomment the `disk:` block below                      │
# │  3. Change DB_PATH value to /data/properly.db              │
# │  4. Redeploy                                               │
# └────────────────────────────────────────────────────────────┘

services:
  # ── BACKEND API ──────────────────────────────────────────────
  - type: web
    name: properly-api
    runtime: node
    region: oregon
    plan: free              # Change to starter ($7/mo) for Option B (Render Disk)

    rootDir: backend
    buildCommand: apt-get install -y ffmpeg 2>/dev/null || true && npm install
    startCommand: npm start

    # OPTION B — Render Disk (uncomment + upgrade to Starter plan)
    # disk:
    #   name: properly-sqlite
    #   mountPath: /data
    #   sizeGB: 1

    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 10000

      # ── DATABASE — CLOUDFLARE R2 (recommended, free) ───────
      # dash.cloudflare.com → R2 → Create bucket "properly"
      # R2 → Manage R2 API tokens → Create (Object Read & Write)
      - key: R2_ACCOUNT_ID
        sync: false         # Cloudflare Account ID
      - key: R2_ACCESS_KEY_ID
        sync: false         # R2 API token Access Key ID
      - key: R2_SECRET_KEY
        sync: false         # R2 API token Secret Access Key
      - key: R2_BUCKET
        value: properly     # Your R2 bucket name
      # DB local path (R2 restore/backup happens on top of this file)
      - key: DB_PATH
        value: /tmp/properly.db

      # ── RENDER DISK (alternative: $7/mo Starter plan) ────────
      # 1. Upgrade service to Starter plan
      # 2. Uncomment disk: block above
      # 3. Change DB_PATH to /data/properly.db

      # ── AUTH ──────────────────────────────────────────────────
      # ⚠️  IMPORTANT: Set this ONCE manually and never change it.
      # Changing JWT_SECRET logs out ALL users instantly.
      # Generate a strong secret: node -e "console.log(require('crypto').randomBytes(64).toString('hex'))"
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 30d   # 30 days — users stay logged in across deploys

      # Comma-separated emails auto-promoted to admin on login
      - key: ADMIN_EMAILS
        sync: false

      # ── CORS ──────────────────────────────────────────────────
      - key: CORS_ORIGINS
        value: https://properly-web.onrender.com
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 200

      # ── EMAIL (Resend — free, HTTPS, works on Render) ─────────
      # resend.com → API Keys → Create
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: noreply@properly.app

      # ── SOCIAL OAUTH ──────────────────────────────────────────
      - key: API_URL
        value: https://properly-api.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false

      # ── STRIPE ────────────────────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_SPROUT_MONTHLY
        sync: false
      - key: STRIPE_PRICE_FOREST_MONTHLY
        sync: false

      # ── AI / SPEECH ───────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: AZURE_SPEECH_KEY
        sync: false
      - key: AZURE_SPEECH_REGION
        value: uksouth

  # ── FRONTEND STATIC SITE ─────────────────────────────────────
  - type: web
    name: properly-web
    runtime: static
    region: oregon

    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate

    envVars:
      - key: VITE_API_URL
        fromService:
          name: properly-api
          type: web
          property: host

  # ── ADMIN PANEL (separate static site) ──────────────────────
  - type: web
    name: properly-admin
    runtime: static
    region: oregon

    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        fromService:
          name: properly-api
          type: web
          property: host
